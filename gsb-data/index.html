<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GSB Data Explorer - Fixed</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #f0f0f0;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
        .explorer-header {
            background-color: #fff;
            padding: 8px 15px;
            border-bottom: 1px solid #ddd;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .path-bar {
            flex-grow: 1;
            border: 1px solid #ccc;
            padding: 4px 10px;
            background-color: #f9f9f9;
            font-size: 13px;
        }
        .main-container {
            display: flex;
            flex: 1;
            overflow: hidden;
        }
        /* Sidebar File List */
        #file-list {
            width: 350px;
            background-color: #fff;
            border-right: 1px solid #ddd;
            overflow-y: auto;
        }
        .file-item {
            display: flex;
            align-items: center;
            padding: 8px 12px;
            cursor: pointer;
            border-bottom: 1px solid #f5f5f5;
            transition: 0.2s;
        }
        .file-item:hover { background-color: #e5f3ff; }
        .file-item.active { background-color: #cce8ff; outline: 1px solid #99d1ff; }
        .file-icon { width: 20px; height: 20px; margin-right: 10px; color: #e74c3c; flex-shrink: 0; }
        .file-name { font-size: 13px; color: #333; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        /* Preview Section */
        #preview-container {
            flex: 1;
            background-color: #525659;
            position: relative;
        }
        iframe { width: 100%; height: 100%; border: none; display: none; }
        .placeholder {
            color: white;
            text-align: center;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }
    </style>
</head>
<body>

<div class="explorer-header">
    <div style="font-weight: bold; color: #0067b8; font-size: 14px;">GSB-DATA Explorer</div>
    <div class="path-bar">This PC > Document > gsb-data</div>
</div>

<div class="main-container">
    <div id="file-list">
        </div>

    <div id="preview-container">
        <div id="msg" class="placeholder">
            <h3>Pratinjau File</h3>
            <p>Pilih file PDF untuk melihat isi</p>
        </div>
        <iframe id="pdf-viewer"></iframe>
    </div>
</div>

<script>
    // Link utama folder data Anda
    const rawBaseUrl = "https://raw.githubusercontent.com/faridazrighani/gsb-data/main/";

    // Daftar file manual sesuai gambar repositori Anda agar tidak error API
    const pdfFiles = [
        "Q24-102-STR-01.pdf",
        "V-24021-GSB-ME-CL-001_PIG RECEIVER (S-3000)_REV C_CALCULATION.pdf",
        "V-24021-GSB-QC-PR-601_QC MANUAL.pdf",
        "V-24021-GSB-QC-PR-602_Pig Receiver Inspection and Test Plan_REV.1.pdf",
        "V-24021-XI-MEC-PR-001_PIG RECEIVER (S-3000)_REV 0_GENERAL ARRANGEMENT.pdf"
    ];

    const listElement = document.getElementById('file-list');
    const viewer = document.getElementById('pdf-viewer');
    const msg = document.getElementById('msg');

    function loadFiles() {
        pdfFiles.forEach(fileName => {
            const div = document.createElement('div');
            div.className = 'file-item';
            div.innerHTML = `
                <svg class="file-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                    <polyline points="14 2 14 8 20 8"></polyline>
                </svg>
                <span class="file-name" title="${fileName}">${fileName}</span>
            `;
            
            div.onclick = function() {
                // Highlight item
                document.querySelectorAll('.file-item').forEach(i => i.classList.remove('active'));
                div.classList.add('active');
                
                // Tampilkan PDF
                msg.style.display = 'none';
                viewer.style.display = 'block';
                viewer.src = rawBaseUrl + encodeURIComponent(fileName);
            };
            
            listElement.appendChild(div);
        });
    }

    loadFiles();
</script>

</body>
</html>
