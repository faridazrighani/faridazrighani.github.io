<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GSB Data Explorer</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f0f0;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* Header Explorer */
        .explorer-header {
            background-color: #fff;
            padding: 10px 20px;
            border-bottom: 1px solid #ddd;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .path-bar {
            flex-grow: 1;
            border: 1px solid #ccc;
            padding: 5px 10px;
            background-color: #f9f9f9;
            font-size: 14px;
            color: #333;
        }

        /* Main Content */
        .main-container {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* File List Section */
        #file-list {
            width: 40%;
            background-color: #fff;
            border-right: 2px solid #ddd;
            overflow-y: auto;
        }

        .file-item {
            display: flex;
            align-items: center;
            padding: 10px 15px;
            cursor: pointer;
            border-bottom: 1px solid #f0f0f0;
            transition: background 0.2s;
        }

        .file-item:hover {
            background-color: #e5f3ff;
        }

        .file-item.active {
            background-color: #cce8ff;
            outline: 1px solid #99d1ff;
        }

        .file-icon {
            width: 24px;
            height: 24px;
            margin-right: 12px;
            color: #e74c3c; /* PDF Red */
        }

        .file-name {
            font-size: 14px;
            color: #333;
            word-break: break-all;
        }

        /* Preview Section */
        #preview-container {
            flex: 1;
            background-color: #525659;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .no-selection {
            text-align: center;
            opacity: 0.6;
        }

        /* Loading Spinner */
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #3498db;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="explorer-header">
        <div style="font-weight: bold; color: #0067b8;">GSB-DATA Explorer</div>
        <div class="path-bar">This PC > Document > gsb-data</div>
    </div>

    <div class="main-container">
        <div id="file-list">
            <div id="loading" class="loader"></div>
        </div>

        <div id="preview-container">
            <div id="preview-placeholder" class="no-selection">
                <h3>Pratinjau File</h3>
                <p>Pilih file PDF di sebelah kiri untuk melihat isi.</p>
            </div>
            <iframe id="pdf-viewer" style="display: none;"></iframe>
        </div>
    </div>

    <script>
        // Konfigurasi API GitHub
        const username = 'faridazrighani';
        const repo = 'gsb-data';
        const apiUrl = `https://api.github.com/repos/${username}/${repo}/contents/`;
        const rawBaseUrl = `https://raw.githubusercontent.com/${username}/${repo}/main/`;

        async function fetchFiles() {
            const fileListElement = document.getElementById('file-list');
            const loadingElement = document.getElementById('loading');

            try {
                const response = await fetch(apiUrl);
                const files = await response.json();

                loadingElement.style.display = 'none';

                // Filter hanya file PDF
                const pdfFiles = files.filter(file => file.name.toLowerCase().endsWith('.pdf'));

                if (pdfFiles.length === 0) {
                    fileListElement.innerHTML = '<p style="padding:20px;">Tidak ada file PDF ditemukan.</p>';
                    return;
                }

                pdfFiles.forEach(file => {
                    const item = document.createElement('div');
                    item.className = 'file-item';
                    item.innerHTML = `
                        <svg class="file-icon" fill="currentColor" viewBox="0 0 20 20">
                            <path d="M9 2a2 2 0 00-2 2v8a2 2 0 002 2h6a2 2 0 002-2V6.414A2 2 0 0016.414 5L14 2.586A2 2 0 0012.586 2H9z"></path>
                            <path d="M3 8a2 2 0 012-2v10h8a2 2 0 01-2 2H5a2 2 0 01-2-2V8z"></path>
                        </svg>
                        <span class="file-name">${file.name}</span>
                    `;

                    item.onclick = () => showPreview(file.name, item);
                    fileListElement.appendChild(item);
                });

            } catch (error) {
                console.error('Error fetching data:', error);
                fileListElement.innerHTML = '<p style="padding:20px; color:red;">Gagal memuat data. Periksa koneksi atau limit API GitHub.</p>';
            }
        }

        function showPreview(fileName, element) {
            const viewer = document.getElementById('pdf-viewer');
            const placeholder = document.getElementById('preview-placeholder');

            // Hapus kelas aktif dari item lain
            document.querySelectorAll('.file-item').forEach(el => el.classList.remove('active'));
            // Tambah kelas aktif ke yang dipilih
            element.classList.add('active');

            // Set URL PDF (Menggunakan viewer bawaan browser)
            const fileUrl = rawBaseUrl + fileName;
            viewer.src = fileUrl;
            
            // Tampilkan viewer
            placeholder.style.display = 'none';
            viewer.style.display = 'block';
        }

        // Jalankan saat halaman dimuat
        fetchFiles();
    </script>
</body>
</html>
