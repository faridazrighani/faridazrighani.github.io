<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GSB Data Explorer - Responsive</title>
    <style>
        /* Pengaturan Dasar */
        * { box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #f0f0f0; 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            height: 100vh; 
            overflow: hidden; 
        }

        /* Header Explorer */
        .explorer-header { 
            background-color: #fff; 
            padding: 10px 20px; 
            border-bottom: 1px solid #ddd; 
            display: flex; 
            align-items: center; 
            gap: 15px; 
        }
        .header-title {
            font-weight: bold; 
            color: #0067b8;
            white-space: nowrap;
        }
        .path-bar { 
            flex-grow: 1; 
            border: 1px solid #ccc; 
            padding: 5px 10px; 
            background-color: #f9f9f9; 
            font-size: 14px; 
            color: #333; 
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        /* Layout Utama (Kiri-Kanan untuk Desktop) */
        .main-container { 
            display: flex; 
            flex: 1; 
            overflow: hidden; 
            flex-direction: row; /* Default Desktop */
        }
        
        /* Panel Kiri: Daftar File */
        #file-list { 
            width: 35%; 
            min-width: 250px; 
            background-color: #fff; 
            border-right: 1px solid #ddd; 
            overflow-y: auto; 
        }
        .file-item { 
            display: flex; 
            align-items: center; 
            padding: 12px 15px; 
            cursor: pointer; 
            border-bottom: 1px solid #f0f0f0; 
            transition: background 0.2s; 
        }
        .file-item:hover { background-color: #e5f3ff; }
        .file-item.active { background-color: #cce8ff; border-left: 4px solid #0067b8; padding-left: 11px; }
        .file-icon { width: 24px; height: 24px; margin-right: 12px; color: #e74c3c; flex-shrink: 0; }
        .file-name { font-size: 13px; color: #333; word-break: break-all; }
        
        /* Panel Kanan: Preview PDF */
        #preview-container { 
            flex: 1; 
            background-color: #525659; 
            display: flex; 
            flex-direction: column; 
            position: relative; 
        }
        iframe { width: 100%; height: 100%; border: none; display: none; background: white;}
        .placeholder { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: white; text-align: center; width: 80%; }
        
        /* Tombol Buka Tab Baru */
        .fallback-link { 
            display: none; 
            position: absolute; 
            bottom: 20px; 
            right: 20px; 
            background: #0067b8; 
            color: white; 
            padding: 10px 15px; 
            text-decoration: none; 
            border-radius: 4px; 
            font-size: 14px; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.4); 
            z-index: 10; 
            font-weight: bold;
        }
        .fallback-link:hover { background: #005da6; }

        /* =========================================================
           MEDIA QUERIES (Untuk Tablet & Cellular / Mobile) 
           ========================================================= */
        @media screen and (max-width: 768px) {
            .explorer-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 8px;
                padding: 10px;
            }
            .path-bar { width: 100%; }
            
            /* Ubah layout menjadi Atas-Bawah */
            .main-container { flex-direction: column; }
            
            #file-list { 
                width: 100%; 
                min-width: 100%;
                height: 35vh; /* Mengambil 35% tinggi layar HP */
                border-right: none; 
                border-bottom: 2px solid #ccc; 
            }
            
            #preview-container { 
                width: 100%;
                height: 65vh; /* Mengambil sisa layar untuk PDF */
            }

            .fallback-link {
                bottom: 10px;
                right: 10px;
                padding: 8px 12px;
                font-size: 12px;
            }
        }
    </style>
</head>
<body>

    <div class="explorer-header">
        <div class="header-title">GSB-DATA Explorer</div>
        <div class="path-bar">This PC > Document > gsb-data</div>
    </div>

    <div class="main-container">
        <div id="file-list"></div>
        
        <div id="preview-container">
            <div id="msg" class="placeholder">
                <h3>Pratinjau File</h3>
                <p>Pilih file PDF untuk melihat isi.</p>
            </div>
            <iframe id="pdf-viewer"></iframe>
            <a id="fallback-btn" class="fallback-link" href="#" target="_blank">Buka PDF Fullscreen</a>
        </div>
    </div>

    <script>
        // Link utama folder data Anda
        const rawBaseUrl = "https://faridazrighani.github.io/gsb-data/";

        // Daftar file PDF
        const pdfFiles = [
            "Q24-102-STR-01.pdf",
            "V-24021-GSB-ME-CL-001_PIG RECEIVER (S-3000)_REV C_CALCULATION.pdf",
            "V-24021-GSB-QC-PR-601_QC MANUAL.pdf",
            "V-24021-GSB-QC-PR-602_Pig Receiver Inspection and Test Plan_REV.1.pdf",
            "V-24021-XI-MEC-PR-001_PIG RECEIVER (S-3000)_REV 0_GENERAL ARRANGEMENT.pdf"
        ];

        const listElement = document.getElementById('file-list');
        const viewer = document.getElementById('pdf-viewer');
        const msg = document.getElementById('msg');
        const fallbackBtn = document.getElementById('fallback-btn');

        pdfFiles.forEach(fileName => {
            const div = document.createElement('div');
            div.className = 'file-item';
            div.innerHTML = `
                <svg class="file-icon" fill="currentColor" viewBox="0 0 20 20">
                    <path d="M9 2a2 2 0 00-2 2v8a2 2 0 002 2h6a2 2 0 002-2V6.414A2 2 0 0016.414 5L14 2.586A2 2 0 0012.586 2H9z"></path>
                    <path d="M3 8a2 2 0 012-2v10h8a2 2 0 01-2 2H5a2 2 0 01-2-2V8z"></path>
                </svg>
                <span class="file-name">${fileName}</span>
            `;
            
            div.onclick = function() {
                // Hapus efek aktif dari yang lain
                document.querySelectorAll('.file-item').forEach(i => i.classList.remove('active'));
                div.classList.add('active');
                
                // URL asli
                const fileUrl = rawBaseUrl + encodeURIComponent(fileName);
                // URL Google Viewer
                const googleViewerUrl = 'https://docs.google.com/viewer?url=' + encodeURIComponent(fileUrl) + '&embedded=true';
                
                // Tampilkan Iframe
                msg.style.display = 'none';
                viewer.style.display = 'block';
                viewer.src = googleViewerUrl;

                // Siapkan tombol eksternal
                fallbackBtn.href = fileUrl;
                fallbackBtn.style.display = 'block';
                
                // Opsional untuk HP: Scroll otomatis sedikit ke bawah agar preview terlihat jelas
                if (window.innerWidth <= 768) {
                    document.getElementById('preview-container').scrollIntoView({ behavior: 'smooth' });
                }
            };
            
            listElement.appendChild(div);
        });
    </script>
</body>
</html>
